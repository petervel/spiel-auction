services:
  db:
    image: mysql:latest
    environment:
      MYSQL_ROOT_PASSWORD: ${DATABASE_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DATABASE_NAME}
      MYSQL_USER: ${DATABASE_USER}
      MYSQL_PASSWORD: ${DATABASE_PASSWORD}
      MYSQL_LOG_BIN: 0
    volumes: 
      - ./data:/var/lib/mysql
      - ./my.cnf:/etc/mysql/conf.d/my.cnf
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "--silent"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - web
    restart: unless-stopped

  backend:
    build:
      context: ./backend
    image: spiel-auction-backend:prod
    env_file:
      - .env
    volumes:
      - xml-data:/app/xml-data
      - ./backend/prisma:/app/prisma
      - ./backend/src:/app/src
      - ./backend/node_modules:/app/node_modules
    networks:
      - web
    depends_on:
      db:
        condition: service_healthy

  backend-api:
    image: spiel-auction-backend:prod
    command: sh -c "npx prisma migrate deploy && yarn start:api"
    env_file:
      - .env
    volumes:
      - ./backend/src:/app/src
      - ./backend/prisma:/app/prisma
      - ./backend/node_modules:/app/node_modules
    depends_on:
      - db
    networks:
      - web
    healthcheck:
      test: ["CMD", "wget", "--spider", "http://127.0.0.1:3000/health"]
      interval: 10s
      timeout: 10s
      retries: 10

  backend-importer:
    image: spiel-auction-backend:prod
    command: yarn start:importer
    env_file:
      - .env
    volumes:
      - ./backend/src:/app/src
      - ./backend/prisma:/app/prisma
      - ./backend/node_modules:/app/node_modules
    depends_on:
      - db
    networks:
      - web

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        VITE_AUTH0_DOMAIN: ${AUTH0_DOMAIN}
        VITE_AUTH0_CLIENT_ID: ${AUTH0_CLIENT_ID}
        VITE_AUTH0_AUDIENCE: ${AUTH0_AUDIENCE}
        VITE_DEFAULT_GEEKLIST_ID: ${DEFAULT_GEEKLIST_ID}
        VITE_GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
        VITE_GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI}
    environment:
      VITE_AUTH0_DOMAIN: ${AUTH0_DOMAIN}
      VITE_AUTH0_CLIENT_ID: ${AUTH0_CLIENT_ID}
      VITE_AUTH0_AUDIENCE: ${AUTH0_AUDIENCE}
      VITE_DEFAULT_GEEKLIST_ID: ${DEFAULT_GEEKLIST_ID}
      VITE_GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      VITE_GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI}
    volumes:
      - frontend-build:/usr/share/nginx/html
    expose:
      - "80"
    depends_on:
      - backend-api
    networks:
      - web
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    volumes:
      - frontend-build:/usr/share/nginx/html
      - ./nginx/nginx.prod.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend-api
    networks:
      - web
    restart: unless-stopped

  xml-fetcher:
    build: ./xml-fetcher
    volumes:
      - xml-data:/app/data
    networks:
      - web
    restart: unless-stopped
    environment:
      - DEFAULT_GEEKLIST_ID=${DEFAULT_GEEKLIST_ID}

  redis:
    image: redis:latest
    networks:
      - web
    restart: unless-stopped

volumes:
  xml-data:
  frontend-build:

networks:
  web:
    external: true