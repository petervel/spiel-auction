services:
  db:
    image: mysql:latest
    environment:
      MYSQL_ROOT_PASSWORD: ${DATABASE_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DATABASE_NAME}
      MYSQL_USER: ${DATABASE_USER}
      MYSQL_PASSWORD: ${DATABASE_PASSWORD}
      MYSQL_LOG_BIN: 0
    volumes: 
      - ./data:/var/lib/mysql
      - ./my.cnf:/etc/mysql/conf.d/my.cnf
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "--silent"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - web
    restart: unless-stopped

  auctions-backend:
    build:
      context: ./backend
    container_name: auctions-backend
    image: spiel-auction-backend:prod
    env_file:
      - .env
    volumes:
      - xml-data:/app/xml-data
      - ./backend/prisma:/app/prisma
    networks:
      - web
    depends_on:
      db:
        condition: service_healthy

  auctions-backend-api:
    image: spiel-auction-backend:prod
    container_name: auctions-backend-api
    command: sh -c "npx prisma migrate deploy && yarn start:api"
    env_file:
      - .env
    volumes:
      - ./backend/prisma:/app/prisma
    networks:
      - web
    depends_on:
      - db
    healthcheck:
      test: ["CMD", "wget", "--spider", "http://127.0.0.1:3000/health"]
      interval: 10s
      timeout: 10s
      retries: 10

  auctions-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        VITE_API_URL: /api
    container_name: auctions-frontend
    environment:
      VITE_API_URL: /api
    volumes:
      - frontend-build:/usr/share/nginx/html
    expose:
      - "80"
    depends_on:
      - auctions-backend-api
    networks:
      - web
    restart: unless-stopped

  redis:
    image: redis:latest
    container_name: auctions-redis
    networks:
      - web
    restart: unless-stopped

  xml-fetcher:
    build: ./xml-fetcher
    container_name: auctions-xml-fetcher
    volumes:
      - xml-data:/app/data
    networks:
      - web
    restart: unless-stopped
    environment:
      - DEFAULT_GEEKLIST_ID=${DEFAULT_GEEKLIST_ID}

volumes:
  xml-data:
  frontend-build:

networks:
  web:
    external: true